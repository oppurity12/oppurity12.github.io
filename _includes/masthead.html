{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__social">
      <a href="mailto:oppurity@postech.ac.kr" title="Email"><i class="fas fa-envelope"></i></a>
      <a href="https://github.com/oppurity12" title="GitHub"><i class="fab fa-github"></i></a>
      <a href="https://scholar.google.com/citations?user=hWf-i20AAAAJ&hl=ko" title="Google Scholar"><i class="ai ai-google-scholar"></i></a>
      <a href="https://www.linkedin.com/in/jeong-yeon-hwang-608a502b9" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
    </div>
    <nav class="masthead__nav">
      <ul>
        {% for link in site.data.navigation.main %}
          {% if link.url contains 'http' %}
            {% assign domain = '' %}
          {% else %}
            {% assign domain = base_path %}
          {% endif %}
          <li><a href="{{ domain }}{{ link.url }}">{{ link.title }}</a></li>
        {% endfor %}
      </ul>
      <a id="theme-toggle" role="button" tabindex="0" aria-label="toggle theme" title="toggle theme">
        <i id="theme-icon" class="fas fa-sun" aria-hidden="true"></i>
      </a>
    </nav>
  </div>
</div>

<!-- Theme toggle: inlined here because the site loads pre-built main.min.js,
     so changes to assets/js/_main.js do not reach the browser without a rebuild.
     Mirrors the academicpages reference implementation. -->
<script>
(function () {
  function applyTheme(theme) {
    var icon = document.getElementById('theme-icon');
    if (theme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      if (icon) { icon.className = 'fas fa-moon'; }
    } else {
      document.documentElement.removeAttribute('data-theme');
      if (icon) { icon.className = 'fas fa-sun'; }
    }
  }

  function currentTheme() {
    var saved = localStorage.getItem('theme');
    if (saved === 'dark' || saved === 'light') return saved;
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      return 'dark';
    }
    return 'light';
  }

  function bind() {
    var btn = document.getElementById('theme-toggle');
    if (!btn || btn.dataset.bound) return;
    btn.dataset.bound = '1';
    btn.style.cursor = 'pointer';
    btn.addEventListener('click', function (e) {
      e.preventDefault();
      var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      localStorage.setItem('theme', next);
      applyTheme(next);
    });
  }

  function init() {
    applyTheme(currentTheme());
    bind();
  }

  // Run immediately so the icon class is correct before paint, then re-bind on
  // DOMContentLoaded in case the button was not yet in the DOM.
  init();
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  }

  // Follow OS preference live, but only if the user has not explicitly chosen.
  if (window.matchMedia) {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
      if (!localStorage.getItem('theme')) {
        applyTheme(e.matches ? 'dark' : 'light');
      }
    });
  }
})();
</script>
